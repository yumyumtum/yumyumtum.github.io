<svg width="512" height="512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00aa00;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="#000000" stroke="url(#grad)" stroke-width="8" filter="url(#glow)"/>
  
  <!-- Letter "T" in retro terminal style -->
  <text x="256" y="340" font-family="'Courier New', monospace" font-size="280" font-weight="bold" 
        fill="url(#grad)" text-anchor="middle" filter="url(#glow)">T</text>
</svg>
